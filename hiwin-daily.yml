name: 每日更新上銀監控資料

on:
  schedule:
    # 台灣時間 收盤後 15:30 = UTC 07:30
    - cron: '30 7 * * 1-5'
  workflow_dispatch:   # 允許手動觸發

jobs:
  fetch-hiwin:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch_hiwin.py
        run: python fetch_hiwin.py

      - name: Commit & push data/hiwin.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hiwin.json
          git diff --cached --quiet || git commit -m "chore: update hiwin data $(date +'%Y-%m-%d %H:%M')"
          git push
